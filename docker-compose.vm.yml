services:
  postgres:
    image: postgres:16-alpine
    container_name: zelodesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zelodesk}
      POSTGRES_USER: ${POSTGRES_USER:-zelodesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zelodesk}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zelodesk} -d ${POSTGRES_DB:-zelodesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: "./ZeloDesk - BackEnd/zelodesk"
    container_name: zelodesk-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PROFILE: dev
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-zelodesk}
      DB_USER: ${POSTGRES_USER:-zelodesk}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-zelodesk}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      CLIENT_ID: ${CLIENT_ID:-zelodesk-client}
      CLIENT_SECRET: ${CLIENT_SECRET:-zelodesk-secret}
      JWT_DURATION: ${JWT_DURATION:-86400}
      CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
    expose:
      - "8080"

  frontend:
    build:
      context: ./Zelodesk-frontend
      args:
        VITE_API_URL: /api
    container_name: zelodesk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres-data:
