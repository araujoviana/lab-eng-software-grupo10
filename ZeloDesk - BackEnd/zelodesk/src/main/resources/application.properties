spring.application.name=zelodesk
spring.profiles.active=${APP_PROFILE:dev}

spring.jpa.open-in-view=false

security.client-id=${CLIENT_ID:zelodesk-client}
security.client-secret=${CLIENT_SECRET:zelodesk-secret}

security.jwt.duration=${JWT_DURATION:86400}

cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
