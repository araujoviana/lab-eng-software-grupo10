services:
  backend:
    build:
      context: "./ZeloDesk - BackEnd/zelodesk"
    container_name: zelodesk-backend
    restart: unless-stopped
    environment:
      APP_PROFILE: dev
      DB_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}?sslmode=${DB_SSLMODE:-require}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      CLIENT_ID: ${CLIENT_ID:-zelodesk-client}
      CLIENT_SECRET: ${CLIENT_SECRET:-zelodesk-secret}
      JWT_DURATION: ${JWT_DURATION:-86400}
      CORS_ORIGINS: ${PUBLIC_ORIGIN}
    expose:
      - "8080"

  frontend:
    build:
      context: ./Zelodesk-frontend
      args:
        VITE_API_URL: /api
    container_name: zelodesk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
