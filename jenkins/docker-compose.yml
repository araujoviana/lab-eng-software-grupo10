services:
  jenkins:
    build: .
    container_name: zelodesk-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs/jenkins.yaml
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      JENKINS_URL: ${JENKINS_URL:-http://localhost:8080}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-https://github.com/araujoviana/lab-eng-software-grupo10.git}
      GITHUB_REPO_BRANCH: ${GITHUB_REPO_BRANCH:-main}
    volumes:
      - jenkins-home:/var/jenkins_home
      - ./casc:/var/jenkins_home/casc_configs:ro
      - ./jobs:/usr/share/jenkins/ref/jobs-dsl:ro

volumes:
  jenkins-home:
